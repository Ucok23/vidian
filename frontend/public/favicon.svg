<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Indigo Gradients -->
    <linearGradient id="indigo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="slate-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    <!-- Amber Gradient -->
    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <!-- Amber Glow -->
    <filter id="amber-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Left leg of asymmetrical V (Indigo ribbon) -->
  <path d="M 38 20 L 38 62 L 64 104" 
        fill="none" 
        stroke="url(#indigo-grad)" 
        stroke-width="14" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Right leg of asymmetrical V (Dark Indigo ribbon) -->
  <path d="M 90 20 L 64 104" 
        fill="none" 
        stroke="url(#slate-grad)" 
        stroke-width="14" 
        stroke-linecap="round" />

  <!-- Code brackets in glowing Amber -->
  <g filter="url(#amber-glow)">
    <!-- Left bracket < -->
    <path d="M 22 46 L 12 56 L 22 66" 
          fill="none" 
          stroke="url(#amber-grad)" 
          stroke-width="5.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Right bracket > -->
    <path d="M 106 46 L 116 56 L 106 66" 
          fill="none" 
          stroke="url(#amber-grad)" 
          stroke-width="5.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Vertical editor cursor | in the center of the V -->
    <line x1="64" y1="36" x2="64" y2="76" 
          stroke="url(#amber-grad)" 
          stroke-width="6.5" 
          stroke-linecap="round" />
  </g>
</svg>